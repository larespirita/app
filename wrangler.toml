name = "lar-espirita"
main = "worker/src/index.js"
compatibility_date = "2026-07-01"

# Serve os arquivos estáticos do app (tudo o que já existia: index.html, css/, js/, assets/, data/)
# e cai no Worker (worker/src/index.js) só para as rotas /api/*
[assets]
directory = "."
binding = "ASSETS"
exclude = ["worker/**", "wrangler.toml"]

# Banco de dados — crie com: wrangler d1 create lar-espirita-db
# e cole o database_id gerado aqui embaixo.
[[d1_databases]]
binding = "DB"
database_name = "lar-espirita-db"
database_id = "COLE_AQUI_O_ID_GERADO_PELO_WRANGLER"

# Variáveis públicas (não são segredo — o Client ID do Google é visível no navegador de qualquer forma)
[vars]
GOOGLE_CLIENT_ID = "COLE_AQUI_SEU_CLIENT_ID.apps.googleusercontent.com"

# Segredos de verdade (NÃO vão aqui no arquivo — configure via terminal):
#   wrangler secret put ANTHROPIC_API_KEY
